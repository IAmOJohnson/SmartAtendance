{% extends "base.html" %}

{% block title %}Lecturer Login{% endblock %}
{% block subtitle %}Lecturer Portal{% endblock %}

{% block content %}
<div class="nav-links">
    <a href="/" class="btn btn-secondary">← Back to Home</a>
</div>

<div style="max-width: 500px; margin: 50px auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 5em;">👨‍🏫</div>
            <h2 style="color: #333;">Lecturer Login</h2>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="staff_id">Staff ID</label>
                <input type="text" id="staff_id" name="staff_id" placeholder="Enter your Staff ID" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
