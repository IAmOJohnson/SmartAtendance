{% extends "base.html" %}

{% block title %}Edit Department{% endblock %}
{% block subtitle %}Edit Department Information{% endblock %}

{% block content %}
<div class="nav-links">
    <a href="/admin/departments" class="btn btn-secondary">← Back to Departments</a>
</div>

<h2 style="color: #333; margin-bottom: 30px;">Edit Department</h2>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Department Name</label>
            <input type="text" id="name" name="name" value="{{ department.name }}" required>
        </div>
        <div class="form-group">
            <label for="faculty_id">Select Faculty</label>
            <select id="faculty_id" name="faculty_id" required>
                <option value="">-- Select Faculty --</option>
                {% for faculty in faculties %}
                    <option value="{{ faculty.id }}" {% if faculty.id == department.faculty_id %}selected{% endif %}>
                        {{ faculty.name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">💾 Update Department</button>
        <a href="/admin/departments" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
