{% extends "base.html" %}

{% block title %}Register Lecturer{% endblock %}
{% block subtitle %}Lecturer Registration{% endblock %}

{% block content %}
<div class="nav-links">
    <a href="/admin" class="btn btn-secondary">← Back to Admin</a>
    <a href="/" class="btn btn-secondary">🏠 Home</a>
</div>

<h2 style="color: #333; margin-bottom: 30px;">Register New Lecturer</h2>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g., Dr. John Smith" required>
        </div>

        <div class="form-group">
            <label for="staff_id">Staff ID</label>
            <input type="text" id="staff_id" name="staff_id" placeholder="e.g., LEC001" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="e.g., john.smith@university.edu" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter secure password" required>
        </div>

        <div class="form-group">
            <label for="department_id">Department</label>
            <select id="department_id" name="department_id" required>
                <option value="">-- Select Department --</option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.faculty_name }})</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-success">Register Lecturer</button>
    </form>
</div>

<div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; border: 1px solid #ffc107;">
    <strong>⚠️ Note:</strong> Make sure to securely share the login credentials with the lecturer.
</div>
{% endblock %}
